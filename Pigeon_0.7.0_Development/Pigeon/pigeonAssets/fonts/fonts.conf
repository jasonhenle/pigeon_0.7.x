<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Illustrator / SVG exports use SharpSans-* family names without spaces. -->
  <alias binding="strong">
    <family>SharpSans-Extrabold</family>
    <prefer><family>Sharp Sans Extrabold</family></prefer>
  </alias>
  <alias binding="strong">
    <family>SharpSans-Semibold</family>
    <prefer><family>Sharp Sans Medium</family></prefer>
  </alias>
  <alias binding="strong">
    <family>SharpSans-Medium</family>
    <prefer><family>Sharp Sans Medium</family></prefer>
  </alias>
</fontconfig>
