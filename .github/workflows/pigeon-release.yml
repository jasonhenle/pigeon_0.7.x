# Build Pi install tarball and publish to GitHub Releases when version.py changes.
name: Pigeon release

on:
  push:
    branches: [main]
    paths:
      - "Pigeon_0.7.0_Development/Pigeon/pigeonSystem/pigeon/version.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Raspberry Pi tarball
        run: bash Pigeon_0.7.0_Development/Pigeon/raspberryPi/package_for_pi.sh

      - name: Read version
        id: ver
        run: |
          VERSION="$(python3 -c "import importlib.util; p='Pigeon_0.7.0_Development/Pigeon/pigeonSystem/pigeon/version.py'; s=importlib.util.spec_from_file_location('pv', p); m=importlib.util.module_from_spec(s); s.loader.exec_module(m); print(m.version_string())")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Pigeon ${VERSION}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          FILE="Pigeon_0.7.0_Development/Pigeon/raspberryPi/dist/pigeon_${VERSION}_raspberry_pi.tar.gz"
          test -f "${FILE}"
          NOTES="Full Pigeon ${VERSION} install package for Raspberry Pi (includes pigeonAssets, installer, and app code).

          Fresh install on Pi:
            curl -fsSL -o /tmp/pigeon-install.sh \\
              \"https://raw.githubusercontent.com/${{ github.repository }}/main/Pigeon_0.7.0_Development/Pigeon/installer/install_from_github.sh\"
            bash /tmp/pigeon-install.sh

          Mac or dev tree: clone or download ZIP from the repo root — see GITHUB.md."
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILE}" --clobber
            gh release edit "${TAG}" --notes "${NOTES}"
          else
            gh release create "${TAG}" "${FILE}" --title "Pigeon ${VERSION}" --notes "${NOTES}"
          fi
